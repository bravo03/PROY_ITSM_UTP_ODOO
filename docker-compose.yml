services:

  db:
    image: postgres:15
    container_name: tesis_postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    restart: always

  odoo:
    image: odoo:18
    container_name: tesis_odoo
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      HOST: db
      USER: odoo
      PASSWORD: odoo
    restart: always
    volumes:
      - ./custom_addons:/mnt/extra-addons